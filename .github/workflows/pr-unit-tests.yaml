name: PR unit tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-unit-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Run unit tests
        run: uv run --frozen pytest
